name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: install imagemagick 7.1.2-27
        run: |
          curl -fsSL -o /tmp/magick.AppImage https://github.com/ImageMagick/ImageMagick/releases/download/7.1.2-27/ImageMagick-7.1.2-27-gcc-x86_64.AppImage
          chmod +x /tmp/magick.AppImage
          cd /tmp && ./magick.AppImage --appimage-extract > /dev/null
          mkdir -p "$HOME/.local/bin"
          ln -s /tmp/squashfs-root/AppRun "$HOME/.local/bin/magick"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: install a font for the text-rendering tests
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core
      - run: bun install --frozen-lockfile
      - run: magick --version
      - run: bunx tsc --noEmit
      - run: bun test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: biomejs/setup-biome@v2
      - run: biome ci .

  node-require:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: require() the built package from commonjs
        run: |
          node --input-type=commonjs -e "
            const { wand } = require('./')
            const parts = wand('rose:').resize(10, 10).args()
            if (parts.join(' ') !== 'rose: -resize 10x10') {
              throw new Error('unexpected argv: ' + parts.join(' '))
            }
            console.log('CJS require OK:', parts.join(' '))
          "
